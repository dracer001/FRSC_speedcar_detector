<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}FRSC Speed Vigil{% endblock %}</title>
  <style>
    :root{
      --bg:#0b0e14; --card:#151921; --card-alt:#1c222d; --border:#232a35;
      --accent:#f39c12; --accent-dark:#e67e22; --text:#e0e0e0; --muted:#7f8c8d;
      --green:#27ae60; --red:#e74c3c; --blue:#7fb3d3;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,sans-serif;
         min-height:100vh;padding:32px 16px}
    a{color:inherit;text-decoration:none}
    h1{color:var(--accent);letter-spacing:2px;font-size:20px}
    .subtitle{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px;margin-top:4px}
    .dot{width:9px;height:9px;background:var(--green);border-radius:50%;display:inline-block}
    .topbar{display:flex;justify-content:space-between;align-items:center;
            max-width:1100px;margin:0 auto 24px;flex-wrap:wrap;gap:12px}
    .btn{background:var(--accent);color:#000;border:none;padding:10px 18px;border-radius:5px;
         font-weight:700;cursor:pointer;transition:.15s;font-size:13px}
    .btn:hover{background:var(--accent-dark);transform:translateY(-1px)}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
    .btn-outline:hover{background:var(--accent);color:#000}
    .btn-danger{background:#e74c3c22;border:1px solid var(--red);color:var(--red)}
    .btn-danger:hover{background:var(--red);color:#fff}
    .btn-ghost{background:#1c222d;border:1px solid #34495e;color:var(--text)}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
           background:var(--card);border:1px solid var(--border);border-left:4px solid var(--accent);
           padding:12px 20px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.5);
           opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:999;max-width:90vw}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
    .toast.error{border-left-color:var(--red)}
    .toast.success{border-left-color:var(--green)}
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <div class="toast" id="toast"></div>
  <script>
    function toast(msg, type){
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(()=> el.classList.remove('show'), 3800);
    }
  </script>
  {% block extra_script %}{% endblock %}
</body>
</html>
